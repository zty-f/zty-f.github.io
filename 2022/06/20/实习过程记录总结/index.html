>11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br></pre></td><td class="code"><pre><span class="line">git操作规范</span><br><span class="line"></span><br><span class="line">修改或者开发新功能流程</span><br><span class="line"></span><br><span class="line"><span class="number">1.</span> git checkout master #切换到master分支</span><br><span class="line"><span class="number">2.</span> git pull  origin master #将master更新到最新状态</span><br><span class="line"><span class="number">3.</span> git checkout -b dev-分支名称  # 从最新master分支切出一个开发分支进行开发</span><br><span class="line"><span class="number">4.</span> 在<span class="number">3</span>操作切出的分支进行功能开发·············</span><br><span class="line"><span class="number">5.</span> 功能完成后~</span><br><span class="line"><span class="number">6.</span> git checkout master #切换回到master分支</span><br><span class="line"><span class="number">7.</span> git pull origin master #将master更新到最新状态（因为在开发过程中可能另外一个人已经将代码合并到master分支）</span><br><span class="line"><span class="number">8.</span> git checkout  dev分支 # 切换回到dev开发分支</span><br><span class="line"><span class="number">9.</span> git rebase master # 修改master基点</span><br><span class="line"><span class="number">10.</span>在从master重新创建新分支同步完成的功能</span><br><span class="line"><span class="number">11.</span> 然后在进行合并到master分支</span><br><span class="line">    </span><br><span class="line"><span class="comment">// git 把一个分支的修改内容转移到master分支然后重新从master建立新分支</span></span><br><span class="line">git stash</span><br><span class="line"></span><br><span class="line">git checkout master</span><br><span class="line"></span><br><span class="line">git pull origin master</span><br><span class="line"></span><br><span class="line">git checkout -b 新分支名称</span><br><span class="line"></span><br><span class="line">git stash pop</span><br><span class="line"></span><br><span class="line">git diff</span><br><span class="line"></span><br><span class="line">git status</span><br><span class="line"></span><br><span class="line"><span class="comment">//  合并分支rebase</span></span><br><span class="line">git checkout master </span><br><span class="line"></span><br><span class="line">git  pull</span><br><span class="line"></span><br><span class="line">git checkout 开发分支</span><br><span class="line"></span><br><span class="line">git rebase master</span><br><span class="line"></span><br><span class="line">处理冲突 </span><br><span class="line"></span><br><span class="line">git  push -f  #强制推送</span><br><span class="line">    </span><br><span class="line"><span class="comment">//  git合并多次commit操作</span></span><br><span class="line"></span><br><span class="line">#### One</span><br><span class="line"><span class="number">1.1</span> git add .  /   git  add 文件名</span><br><span class="line"></span><br><span class="line"><span class="number">1.2</span>. git commit --amend  <span class="string">&quot;message&quot;</span> # 可以将本次提交合并到上一次提交</span><br><span class="line"></span><br><span class="line">#### Two</span><br><span class="line"><span class="number">2.1</span>. git log # 查看提交记录</span><br><span class="line"></span><br><span class="line"><span class="number">2.2</span>. git rebase -i  HEAD~<span class="number">4</span> # 从HEAD版本开始往前数<span class="number">4</span>个版本（根据需要变化起始值和结束值）</span><br><span class="line"></span><br><span class="line"><span class="number">2.3</span>. 进入vim编辑器过后修改需要合并的commit前缀，pick-&gt;s</span><br><span class="line"></span><br><span class="line">例如：</span><br><span class="line">pick commit1</span><br><span class="line">s commit2</span><br><span class="line">pick commit3</span><br><span class="line">s commit4</span><br><span class="line"></span><br><span class="line">上述修改即为把commit2和commit1合并，commit4和commit3合并，根据需要自己调整即可！</span><br><span class="line"></span><br><span class="line">修改完成后保存退出</span><br><span class="line"></span><br><span class="line">可能需要手动处理冲突（处理冲突后 git add .  &amp;&amp;   git rebase --<span class="keyword">continue</span>）</span><br><span class="line"></span><br><span class="line">上述流程完成后会进入commit信息修改，根据需要修改即可，然后保存退出</span><br><span class="line"></span><br><span class="line"><span class="number">2.4</span>. git push -f   /   git  push -f origin 远程分支   # 强制推送到远程分支</span><br></pre></td></tr></table></figure>



<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">k8s常规操作指令</span><br><span class="line"></span><br><span class="line"><span class="number">1.</span>k -n 环境名称 edit deploy 项目名称-deploy  # 修改测试部署项目镜像</span><br><span class="line">例子<span class="number">1</span>： k -n xxx edit deploy xxx-deploy </span><br><span class="line"></span><br><span class="line"><span class="number">2.</span> k -n 环境名称 rollout restart deploy xxx-deploy # 重启项目</span><br><span class="line"></span><br><span class="line"><span class="comment">// 以下路径视情况而定</span></span><br><span class="line"><span class="number">3.</span> tail -f /<span class="keyword">var</span>/log/xxx/xxx/xxx.app.log # 查看日志记录</span><br><span class="line"></span><br><span class="line"><span class="number">4.</span> tail -f /<span class="keyword">var</span>/log/xxx/xxx/xxx.err.log # 查看错误日志记录</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="number">5.</span>grep <span class="string">&#x27;日志内容&#x27;</span> /<span class="keyword">var</span>/log/xxx/xxx/xxx.err.log # 查找日志</span><br><span class="line"></span><br><span class="line"><span class="number">6.</span>ssh  用户名@主机地址    # 通过ssh连接远程</span><br><span class="line"></span><br><span class="line">获取k8s部署情况！</span><br><span class="line">dk get pod| grep xxx  <span class="comment">//查找节点</span></span><br><span class="line"></span><br><span class="line">dk rollout restart deployment xxx-deploy <span class="comment">// 重启节点</span></span><br><span class="line"></span><br><span class="line">k logs 镜像名称 <span class="comment">// 查看k8s日志</span></span><br></pre></td></tr></table></figure>



<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">MongoDB数据库操作</span><br><span class="line"></span><br><span class="line"><span class="number">1.</span> k -n 环境名称 exec -it mongo节点名称 bash # 连接数据库</span><br><span class="line"><span class="number">2.</span>mongo</span><br><span class="line"><span class="number">3.</span>use 数据库名称；# 切换到对应数据库</span><br><span class="line"><span class="number">4.</span>show tables； # 查询数据库所有表</span><br><span class="line"><span class="number">5.</span>db.表名.find();  #查询表信息</span><br><span class="line"><span class="number">6.</span>db.company.find(&#123;<span class="string">&quot;account_id&quot;</span> : <span class="string">&quot;616e71114798df14bc84e00c&quot;</span>&#125;) #匹配查询</span><br><span class="line"></span><br><span class="line">更新数据段</span><br><span class="line"><span class="number">7.</span>db.company.update(&#123;<span class="string">&quot;_id&quot;</span> : ObjectId(<span class="string">&quot;62ba69b0f13474e2c38a3087&quot;</span>)&#125;, &#123;$set:&#123;<span class="string">&quot;auto_configed&quot;</span>:<span class="literal">true</span>&#125;&#125;)</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>



<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">日志级别（开发环境日志级别为INFO）</span><br><span class="line">ALL &lt; TRACE &lt; DEBUG &lt; INFO &lt; WARN &lt; ERROR &lt; FATAL &lt; OFF</span><br><span class="line">开发环境和线上环境日志级别不同！通过控制日志级别减轻线上环境日志压力！</span><br></pre></td></tr></table></figure>
